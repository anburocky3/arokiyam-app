name: Build And Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to rebuild and publish (example: v1.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            command: bun run build:win
          - os: macos-latest
            platform: macOS
            command: bun run build:mac
          - os: ubuntu-latest
            platform: Linux
            command: bun run build:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Bun (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          powershell -c "irm bun.sh/install.ps1|iex"
          "$env:USERPROFILE\.bun\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Bun (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fix app-builder permissions on Linux
        if: runner.os == 'Linux'
        run: chmod +x node_modules/app-builder-bin/linux/x64/app-builder

      - name: Build installers
        run: ${{ matrix.command }}

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.platform }}
          path: dist/**
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            release-assets/**/*-setup.exe
            release-assets/**/latest*.yml
            release-assets/**/*.blockmap
            release-assets/**/*.dmg
            release-assets/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout default branch for README update
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update README download links
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          WINDOWS_URL="${REPO_URL}/releases/download/${RELEASE_TAG}/arokiyam-${VERSION}-setup.exe"
          MAC_URL="${REPO_URL}/releases/download/${RELEASE_TAG}/arokiyam-${VERSION}.dmg"
          LINUX_APPIMAGE_URL="${REPO_URL}/releases/download/${RELEASE_TAG}/arokiyam-${VERSION}.AppImage"

          START_MARKER='<!-- DOWNLOAD_LINKS_START -->'
          END_MARKER='<!-- DOWNLOAD_LINKS_END -->'

          awk -v start="$START_MARKER" -v end="$END_MARKER" \
            -v releaseTag="$RELEASE_TAG" \
            -v wUrl="$WINDOWS_URL" \
            -v mUrl="$MAC_URL" \
            -v lAppUrl="$LINUX_APPIMAGE_URL" '
            BEGIN { in_block=0 }
            {
              if ($0 == start) {
                print $0
                print ""
                print "Latest stable release: **" releaseTag "**"
                print ""
                print "- Windows (Installer): [Download]" "(" wUrl ")"
                print "- macOS (DMG): [Download]" "(" mUrl ")"
                print "- Linux (AppImage): [Download]" "(" lAppUrl ")"
                print ""
                in_block=1
                next
              }
              if ($0 == end) {
                in_block=0
              }
              if (!in_block) {
                print $0
              }
            }
          ' README.md > README.md.tmp

          mv README.md.tmp README.md

      - name: Commit README link updates
        shell: bash
        run: |
          if git diff --quiet README.md; then
            echo "README already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update download links for ${RELEASE_TAG}"
          git push
